apiVersion: v1
kind: Namespace
metadata:
  name: nanoclaw
  labels:
    # The DinD sidecar runs privileged. NKP enforces Pod Security Standards,
    # so this namespace must opt into the privileged profile.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
