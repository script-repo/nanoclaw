apiVersion: v1
kind: Secret
metadata:
  name: nanoclaw-env
  namespace: nanoclaw
type: Opaque
# Placeholders. Fill these in before applying, OR leave blank and set them
# during interactive setup (`pnpm setup` via kubectl exec) which writes them
# into .env on the PVC. src/config.ts reads process.env first, then .env, so
# values provided here take precedence.
stringData:
  ASSISTANT_NAME: "Andy"
  TZ: "America/Toronto"
  # OneCLI credential-vault gateway. Required before any agent container can
  # spawn (src/container-runner.ts refuses to spawn without it).
  ONECLI_URL: ""
  ONECLI_API_KEY: ""
